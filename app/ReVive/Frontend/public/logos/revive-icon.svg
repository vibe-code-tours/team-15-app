<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ri-g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Outer ring segments -->
  <circle cx="32" cy="32" r="28" stroke="url(#ri-g)" stroke-width="3" fill="none" opacity="0.12"/>
  <circle cx="32" cy="32" r="28" stroke="#34d399" stroke-width="3.5" fill="none"
    stroke-dasharray="43.9 131.9" stroke-dashoffset="0" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="28" stroke="#22d3ee" stroke-width="3.5" fill="none"
