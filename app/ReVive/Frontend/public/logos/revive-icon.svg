  <!-- Center chip -->
  <rect x="24" y="24" width="16" height="16" rx="3.5" stroke="url(#ri-g)" stroke-width="2" fill="none"/>
  <circle cx="32" cy="32" r="3" fill="url(#ri-g)"/>
