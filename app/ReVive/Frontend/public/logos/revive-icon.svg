  <!-- Circuit traces -->
  <line x1="32" y1="7" x2="32" y2="21" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="43" x2="32" y2="57" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="7" y1="32" x2="21" y2="32" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="32" x2="57" y2="32" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Node dots -->
  <circle cx="32" cy="4" r="3.5" fill="#34d399"/>
  <circle cx="60" cy="32" r="3.5" fill="#22d3ee"/>
  <circle cx="32" cy="60" r="3.5" fill="#a78bfa"/>
