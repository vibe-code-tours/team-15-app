<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14532d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg4)"/>
  <!-- Circular arrows (recycling symbol) -->
  <path d="M400 200 A100 100 0 0 1 500 300" stroke="url(#leaf)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M500 300 A100 100 0 0 1 350 380" stroke="url(#leaf)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M350 380 A100 100 0 0 1 400 200" stroke="url(#leaf)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Arrow heads -->
  <polygon points="500,290 520,310 490,310" fill="#4ade80"/>
  <polygon points="360,385 340,365 370,365" fill="#4ade80"/>
  <polygon points="395,195 415,215 385,215" fill="#4ade80"/>
  <!-- New products emerging -->
  <rect x="150" y="400" width="60" height="100" rx="8" fill="#374151" stroke="#4ade80" stroke-width="2"/>
  <rect x="160" y="410" width="40" height="60" rx="4" fill="#1a3a2a"/>
  <rect x="250" y="420" width="80" height="60" rx="8" fill="#374151" stroke="#4ade80" stroke-width="2"/>
  <rect x="260" y="430" width="60" height="30" rx="4" fill="#1a3a2a"/>
  <rect x="450" y="400" width="100" height="80" rx="12" fill="#374151" stroke="#4ade80" stroke-width="2"/>
  <rect x="460" y="410" width="80" height="50" rx="8" fill="#1a3a2a"/>
  <rect x="600" y="420" width="60" height="80" rx="8" fill="#374151" stroke="#4ade80" stroke-width="2"/>
  <rect x="610" y="430" width="40" height="50" rx="4" fill="#1a3a2a"/>
  <!-- Title -->
  <text x="400" y="100" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="32" font-weight="bold">REINTEGRATION</text>
  <text x="400" y="130" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="18">Materials return to supply chain</text>
  <!-- Decorative leaves -->
  <circle cx="100" cy="150" r="30" fill="#4ade80" opacity="0.1"/>
  <circle cx="700" cy="450" r="40" fill="#22c55e" opacity="0.1"/>
</svg>