<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <!-- Sorting bins -->
  <rect x="100" y="200" width="150" height="200" rx="12" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="175" y="300" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="bold">PHONES</text>
  <rect x="300" y="200" width="150" height="200" rx="12" fill="#3b1f4a" stroke="#c084fc" stroke-width="2"/>
  <text x="375" y="300" text-anchor="middle" fill="#c084fc" font-family="sans-serif" font-size="16" font-weight="bold">LAPTOPS</text>
  <rect x="500" y="200" width="150" height="200" rx="12" fill="#1a3a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="575" y="300" text-anchor="middle" fill="#4ade80" font-family="sans-serif" font-size="16" font-weight="bold">BATTERIES</text>
  <!-- Items being sorted -->
  <rect x="130" y="250" width="40" height="70" rx="6" fill="#60a5fa" opacity="0.6"/>
  <rect x="330" y="260" width="80" height="50" rx="6" fill="#c084fc" opacity="0.6"/>
  <circle cx="540" cy="280" r="20" fill="#4ade80" opacity="0.6"/>
  <!-- Conveyor belt -->
  <rect x="50" y="450" width="700" height="20" rx="10" fill="#374151"/>
  <circle cx="100" cy="460" r="15" fill="#4b5563"/>
  <circle cx="700" cy="460" r="15" fill="#4b5563"/>
  <!-- Title -->
  <text x="400" y="100" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="32" font-weight="bold">SORTING</text>
  <text x="400" y="140" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="18">Categorize by type and condition</text>
</svg>