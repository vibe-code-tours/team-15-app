<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg7)"/>
  <!-- Tablet 1 -->
  <rect x="180" y="120" width="180" height="260" rx="16" fill="#27272a" stroke="#f472b6" stroke-width="2"/>
  <rect x="192" y="140" width="156" height="220" rx="4" fill="#500724"/>
  <circle cx="270" cy="370" r="10" fill="#3f3f46"/>
  <!-- Tablet 2 -->
  <rect x="420" y="150" width="200" height="180" rx="14" fill="#27272a" stroke="#34d399" stroke-width="2"/>
  <rect x="432" y="162" width="176" height="146" rx="4" fill="#064e3b"/>
  <circle cx="520" cy="315" r="8" fill="#3f3f46"/>
  <!-- Small tablet/e-reader -->
  <rect x="300" y="200" width="100" height="150" rx="10" fill="#27272a" stroke="#fbbf24" stroke-width="2"/>
  <rect x="308" y="212" width="84" height="120" rx="4" fill="#451a03"/>
  <!-- Decorative elements -->
  <circle cx="60" cy="80" r="45" fill="#f472b6" opacity="0.1"/>
  <circle cx="740" cy="520" r="55" fill="#34d399" opacity="0.1"/>
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="36" font-weight="bold">TABLETS</text>
  <text x="400" y="520" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="18">iPads and e-readers</text>
</svg>