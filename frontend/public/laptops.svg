<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#292524;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg6)"/>
  <!-- Laptop 1 -->
  <rect x="150" y="200" width="200" height="130" rx="8" fill="#27272a" stroke="#f97316" stroke-width="2"/>
  <rect x="160" y="210" width="180" height="100" rx="4" fill="#431407"/>
  <rect x="120" y="330" width="260" height="15" rx="4" fill="#3f3f46"/>
  <!-- Laptop 2 -->
  <rect x="450" y="180" width="180" height="120" rx="8" fill="#27272a" stroke="#22d3ee" stroke-width="2"/>
  <rect x="458" y="188" width="164" height="92" rx="4" fill="#083344"/>
  <rect x="425" y="300" width="230" height="12" rx="4" fill="#3f3f46"/>
  <!-- Monitor -->
  <rect x="300" y="100" width="200" height="150" rx="10" fill="#27272a" stroke="#a78bfa" stroke-width="2"/>
  <rect x="310" y="110" width="180" height="120" rx="4" fill="#2e1065"/>
  <rect x="380" y="250" width="40" height="40" fill="#3f3f46"/>
  <rect x="350" y="290" width="100" height="10" rx="4" fill="#3f3f46"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="80" r="40" fill="#f97316" opacity="0.1"/>
  <circle cx="720" cy="520" r="60" fill="#22d3ee" opacity="0.1"/>
  <!-- Title -->
  <text x="400" y="450" text-anchor="middle" fill="#f8fafc" font-family="sans-serif" font-size="36" font-weight="bold">LAPTOPS</text>
  <text x="400" y="490" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="18">Computers and monitors</text>
</svg>